name: Test Nimble Installation

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  test-nimble-install:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
        nim-version: ['2.2.4']
    
    runs-on: ${{ matrix.os }}
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Nim
      uses: jiro4989/setup-nim-action@v2
      with:
        nim-version: ${{ matrix.nim-version }}
        repo-token: ${{ secrets.GITHUB_TOKEN }}

    - name: Display Nim and Nimble versions
      run: |
        nim --version
        nimble --version

    - name: Install waku from current commit
      working-directory: examples/nimble
      run: nimble --verbose install "waku@#${{ github.event.pull_request.head.sha }}"
        
    - name: List installed packages
      working-directory: examples/nimble
      run: |
        nimble list --installed
        
    - name: Run and build example project
      working-directory: examples/nimble
      run: |
        echo "Building test project..."
        nimble --verbose run_example
        